experiment:
  name: opt_resnet50_adamw_mild
  seed: 42
  output_root: hw2/task1/outputs

data:
  root: hw2/Flowers102
  image_size: 224
  batch_size: 32
  num_workers: 4
  augment: mild
  random_erasing: 0.1

model:
  name: resnet50
  pretrained: true
  num_classes: 102

train:
  epochs: 60
  optimizer: adamw
  backbone_lr: 0.00005
  classifier_lr: 0.0005
  weight_decay: 0.01
  scheduler: cosine
  amp: true
  label_smoothing: 0.05
  grad_clip_norm: 1.0
  log_interval: 20

eval:
  tta: true
