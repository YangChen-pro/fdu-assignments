experiment:
  name: opt_efficientnet_b0_strong
  seed: 42
  output_root: hw2/task1/outputs

data:
  root: hw2/Flowers102
  image_size: 224
  batch_size: 64
  num_workers: 4
  augment: strong
  randaugment_ops: 2
  randaugment_magnitude: 7
  random_erasing: 0.25

model:
  name: efficientnet_b0
  pretrained: true
  num_classes: 102

train:
  epochs: 80
  optimizer: adamw
  backbone_lr: 0.00003
  classifier_lr: 0.0005
  weight_decay: 0.01
  scheduler: cosine
  amp: true
  label_smoothing: 0.05
  grad_clip_norm: 1.0
  log_interval: 20

eval:
  tta: true
