experiment:
  name: task3_attention_resunet_b48_tta
  seed: 42
  output_root: hw2/task3/outputs

data:
  image_size: [256, 320]
  batch_size: 6
  augment:
    horizontal_flip: 0.5
    color_jitter: 0.20

model:
  name: attention_resunet
  num_classes: 8
  base_channels: 48
  bilinear: false
  pretrained: false
  dropout: 0.05

train:
  loss: ce_dice
  epochs: 120
  lr: 0.00022
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  early_stopping_patience: 24

eval:
  tta: true
  visualize_samples: 8

logging:
  swanlab:
    enabled: true
    project: cs60003-hw2-task3
    group: resunet-attention-optimization
    tags: [hw2, task3, stanford-background, attention-resunet, ce-dice, base48, tta]
    description: From-scratch residual Attention U-Net, base channel 48, CE+Dice, horizontal-flip TTA.
