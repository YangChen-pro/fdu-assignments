experiment:
  name: task3_attention_unet_b64_480_aug_seed7_tta
  seed: 7
  output_root: hw2/task3/outputs

data:
  image_size: [480, 640]
  batch_size: 8
  augment:
    horizontal_flip: 0.5
    color_jitter: 0.20
    random_scale: [0.75, 1.35]

model:
  name: attention_unet
  num_classes: 8
  base_channels: 64
  bilinear: false
  pretrained: false
  dropout: 0.05

train:
  loss: ce_dice
  epochs: 150
  lr: 0.00022
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  early_stopping_patience: 35

eval:
  tta: true
  visualize_samples: 8

logging:
  swanlab:
    enabled: true
    project: cs60003-hw2-task3
    group: single-model-075-push
    tags: [hw2, task3, attention-unet, high-res, ce-dice, base64, single-model]
    description: Aggressive high-resolution Attention U-Net using the previous best recipe without extra Lovasz or EMA changes.
