experiment:
  name: task3_unet_ce_dice_tta
  seed: 42
  output_root: hw2/task3/outputs

train:
  loss: ce_dice
  epochs: 100
  lr: 0.0003
  weight_decay: 0.0001
  early_stopping_patience: 20

eval:
  tta: true
  visualize_samples: 8

logging:
  swanlab:
    enabled: true
    project: cs60003-hw2-task3
    group: optimization
    tags: [hw2, task3, stanford-background, unet, ce-dice, tta]
    description: Original U-Net CE+Dice setting with horizontal-flip TTA validation.
