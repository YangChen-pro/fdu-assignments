experiment:
  name: task3_unetpp_b64_384_lovasz_ds_tta
  seed: 7
  output_root: hw2/task3/outputs

data:
  image_size: [384, 512]
  batch_size: 6
  augment:
    horizontal_flip: 0.5
    color_jitter: 0.18
    random_scale: [0.70, 1.45]
    rare_class_crop:
      class_ids: [4, 6, 7]
      class_weights: [1.0, 1.5, 1.0]
      probability: 0.30
      min_pixels: 96
      attempts: 16
  sampler:
    enabled: true
    rare_class_id: 6
    rare_class_weight: 1.5
    epoch_multiplier: 1.0

model:
  name: unetpp
  num_classes: 8
  base_channels: 64
  pretrained: false
  dropout: 0.05
  deep_supervision: true
  scse: true
  aspp: true

train:
  loss: ce_dice_lovasz
  lovasz_weight: 0.35
  deep_supervision: true
  deep_supervision_weights: [0.2, 0.3, 0.5, 1.0]
  epochs: 150
  lr: 0.00018
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  early_stopping_patience: 35
  ema_decay: 0.995

eval:
  tta: true
  visualize_samples: 8

logging:
  swanlab:
    enabled: true
    project: cs60003-hw2-task3
    group: single-model-075-push
    tags: [hw2, task3, unet-plus-plus, base64, scse, aspp, lovasz, deep-supervision, ema, single-model]
    description: Aggressive from-scratch U-Net++ base64 run with 384x512 input, scSE, ASPP, deep supervision and CE+Dice+Lovasz.
